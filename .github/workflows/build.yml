name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'  # Trigger sur les tags de version (v1.0.0, v1.1.0, etc.)
  workflow_dispatch:  # Permet de trigger manuellement

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download UnRAR
        run: |
          curl -L -o unrarw64.exe https://www.rarlab.com/rar/unrarw64.exe
          mkdir src\bin
          move unrarw64.exe src\bin\UnRAR.exe

      - name: Build executable
        run: pyinstaller --clean build.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FoliosExtractor
          path: |
            dist/FoliosExtractor.exe
            install/context-menu.reg
            install/uninstall-context-menu.reg
            folios-extractor.conf

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/FoliosExtractor.exe
            install/context-menu.reg
            install/uninstall-context-menu.reg
            folios-extractor.conf
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
